version: '3.8'

services: # Backend API
  backend:
    image: node:20-alpine
    container_name: sheets-summarizer-backend
    working_dir: /app
    env_file:
      - ./.env
    environment:
      NODE_ENV: development
      PORT: 5000
      CHOKIDAR_USEPOLLING: true
      CHOKIDAR_INTERVAL: 1000
    ports:
      - "5000:5000"
    networks:
      - app-network
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev"
    restart: unless-stopped

  # Frontend
  frontend:
    image: node:20-alpine  
    container_name: sheets-summarizer-frontend
    working_dir: /app
    ports:
      - "5173:5173"
    env_file:
      - ./.env  
    environment:
      - NODE_ENV=development
      - HOST=0.0.0.0
      - PORT=5173
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
